services:
  db:
    image: postgres:15-alpine
    container_name: time_sheet_postgres_local
    environment:
      - POSTGRES_USER=usuario_dev
      - POSTGRES_PASSWORD=senha_dev
      - POSTGRES_DB=login_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
